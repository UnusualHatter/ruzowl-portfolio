<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RuzOwl Portfolio 🦉</title>
  <link rel="icon" type="image/png" href="assets/ruz.png" />

  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    
    :root {
      --pink: #eedddf;
      --pink-soft: #fceff0;
      --pink-deep: #e3c9cc;
      --cream: #f7eeea;
      --charcoal: #3e3f41;
      --charcoal-soft: #4a4b4d;
      --ink: #2a2b2d;
      --gray: #7a7a7a;
      --gray-light: #a8a6a4;
      --purple: #8f2ba3;
      --purple-soft: #b96bc8;
      --purple-tint: #f0e2f3;
      --gold: #f0bf59;
      --gold-deep: #d4a23d;
      --gold-tint: #faecc9;
      --status-open-dot: #7aa05c;
      --status-open-bg: rgba(122, 160, 92, 0.12);
      --status-open-color: #3f5a26;
      --status-open-border: rgba(122, 160, 92, 0.20);
      --status-open-glow: none;
      --status-limited-dot: #d4a23d;
      --status-limited-bg: var(--gold-tint);
      --status-limited-color: #6b4d12;
      --status-limited-border: rgba(212, 162, 61, 0.22);
      --status-limited-glow: none;
      --status-ych-dot: #4a78d1;
      --status-ych-bg: rgba(74, 120, 209, 0.12);
      --status-ych-color: #2c4f9a;
      --status-ych-border: rgba(74, 120, 209, 0.18);
      --status-ych-glow: none;
      --status-closed-dot: #b62f43;
      --status-closed-bg: rgba(182, 47, 67, 0.14);
      --status-closed-color: #7f1f30;
      --status-closed-border: rgba(182, 47, 67, 0.22);
      --status-closed-glow: none;

      --bg: var(--pink);
      --surface: #ffffff;
      --surface-warm: var(--pink-soft);
      --text: var(--charcoal);
      --text-muted: var(--gray);

      
      --s-1: 4px;
      --s-2: 8px;
      --s-3: 12px;
      --s-4: 16px;
      --s-5: 24px;
      --s-6: 32px;
      --s-7: 48px;
      --s-8: 64px;
      --s-9: 96px;
      --s-10: 128px;

      
      --r-sm: 8px;
      --r-md: 14px;
      --r-lg: 22px;
      --r-xl: 32px;
      --r-pill: 999px;

      
      --shadow-sm: 0 1px 2px rgba(62, 63, 65, 0.06), 0 2px 6px rgba(143, 43, 163, 0.04);
      --shadow-md: 0 4px 12px rgba(62, 63, 65, 0.06), 0 8px 24px rgba(143, 43, 163, 0.06);
      --shadow-lg: 0 12px 32px rgba(62, 63, 65, 0.08), 0 24px 60px rgba(143, 43, 163, 0.08);
      --shadow-glow-gold: 0 0 0 1px rgba(240, 191, 89, 0.4), 0 8px 24px rgba(240, 191, 89, 0.25);
      --shadow-glow-purple: 0 0 0 1px rgba(143, 43, 163, 0.3), 0 8px 24px rgba(143, 43, 163, 0.2);

      
      --font-display: "Fraunces", "Iowan Old Style", Georgia, serif;
      --font-body: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

      
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-squish: cubic-bezier(0.34, 1.56, 0.64, 1);
      --d-1: 120ms;
      --d-2: 220ms;
      --d-3: 380ms;
      --d-4: 600ms;

      
      --maxw: 1120px;

      
      --nav-bg: rgba(238, 221, 223, 0.82);
      --nav-border: rgba(62, 63, 65, 0.06);

      
      --hero-blob: radial-gradient(60% 60% at 30% 40%, rgba(143,43,163,0.10) 0%, rgba(143,43,163,0) 60%),
                   radial-gradient(50% 60% at 80% 30%, rgba(240,191,89,0.18) 0%, rgba(240,191,89,0) 60%);
    }

    
    html[data-theme="dark"] {
      --pink: #1a1418;          
      --pink-soft: #251c22;     
      --pink-deep: #322630;     
      --cream: #1f1820;         
      --charcoal: #f4e7e9;      
      --charcoal-soft: #e8d8db;
      --ink: #ffffff;
      --gray: #a89ba1;
      --gray-light: #6b5e64;
      --purple: #c768d6;        
      --purple-soft: #d68fe1;
      --purple-tint: #2e1d33;
      --gold: #f5cd72;
      --gold-deep: #e9b346;
      --gold-tint: #3a2c10;
      --status-open-dot: #b4d588;
      --status-open-bg: rgba(180, 213, 136, 0.14);
      --status-open-color: #e8ffcc;
      --status-open-border: rgba(180, 213, 136, 0.30);
      --status-open-glow: 0 0 0 1px rgba(180, 213, 136, 0.30), 0 0 22px rgba(180, 213, 136, 0.28);
      --status-limited-dot: #f5cd72;
      --status-limited-bg: rgba(245, 205, 114, 0.14);
      --status-limited-color: #fff1c8;
      --status-limited-border: rgba(245, 205, 114, 0.30);
      --status-limited-glow: 0 0 0 1px rgba(245, 205, 114, 0.30), 0 0 22px rgba(245, 205, 114, 0.28);
      --status-ych-dot: #88adff;
      --status-ych-bg: rgba(136, 173, 255, 0.16);
      --status-ych-color: #dce7ff;
      --status-ych-border: rgba(136, 173, 255, 0.30);
      --status-ych-glow: 0 0 0 1px rgba(136, 173, 255, 0.28), 0 0 20px rgba(136, 173, 255, 0.22);
      --status-closed-dot: #ff7f99;
      --status-closed-bg: rgba(255, 127, 153, 0.18);
      --status-closed-color: #ffd6df;
      --status-closed-border: rgba(255, 127, 153, 0.30);
      --status-closed-glow: 0 0 0 1px rgba(255, 127, 153, 0.28), 0 0 20px rgba(255, 127, 153, 0.22);

      --bg: var(--pink);
      --surface: #2a2026;
      --surface-warm: var(--pink-soft);
      --text: var(--charcoal);
      --text-muted: var(--gray);

      --shadow-sm: 0 1px 2px rgba(0,0,0,0.4), 0 2px 6px rgba(199,104,214,0.08);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.45), 0 8px 24px rgba(199,104,214,0.1);
      --shadow-lg: 0 12px 32px rgba(0,0,0,0.5), 0 24px 60px rgba(199,104,214,0.14);
      --shadow-glow-gold: 0 0 0 1px rgba(245, 205, 114, 0.4), 0 8px 24px rgba(245, 205, 114, 0.3);
      --shadow-glow-purple: 0 0 0 1px rgba(199, 104, 214, 0.4), 0 8px 28px rgba(199, 104, 214, 0.3);

      --nav-bg: rgba(26, 20, 24, 0.78);
      --nav-border: rgba(244, 231, 233, 0.08);

      --hero-blob: radial-gradient(60% 60% at 30% 40%, rgba(199,104,214,0.16) 0%, rgba(199,104,214,0) 60%),
                   radial-gradient(50% 60% at 80% 30%, rgba(245,205,114,0.16) 0%, rgba(245,205,114,0) 60%);
    }

    
    html[data-mode="nsfw"] {
      
      --pink: #f0d4d8;          
      --pink-soft: #fce0e4;     
      --pink-deep: #e8b8c0;
      --cream: #f8e0e2;         

      
      --charcoal: #3d2429;
      --charcoal-soft: #4d3338;
      --ink: #2a181c;
      --gray: #8a6d72;
      --gray-light: #b8a4a8;

      
      --surface: #fff8f9;

      
      --purple: #a8324a;        
      --purple-soft: #c95877;
      --purple-tint: #fbdce2;

      
      --gold: #d97a85;
      --gold-deep: #b04a5a;
      --gold-tint: #f9d6dc;
      --status-ych-dot: #5f89e8;
      --status-ych-bg: rgba(95, 137, 232, 0.14);
      --status-ych-color: #2f4f9d;
      --status-ych-border: rgba(95, 137, 232, 0.18);
      --status-closed-dot: #b52d48;
      --status-closed-bg: rgba(181, 45, 72, 0.14);
      --status-closed-color: #7a2234;
      --status-closed-border: rgba(181, 45, 72, 0.22);

      
      --shadow-sm: 0 1px 2px rgba(62, 30, 35, 0.07), 0 2px 6px rgba(168, 50, 74, 0.06);
      --shadow-md: 0 4px 12px rgba(62, 30, 35, 0.07), 0 8px 24px rgba(168, 50, 74, 0.10);
      --shadow-lg: 0 12px 32px rgba(62, 30, 35, 0.10), 0 24px 60px rgba(168, 50, 74, 0.12);
      --shadow-glow-gold: 0 0 0 1px rgba(217, 122, 133, 0.4), 0 8px 24px rgba(217, 122, 133, 0.28);
      --shadow-glow-purple: 0 0 0 1px rgba(168, 50, 74, 0.4), 0 8px 28px rgba(168, 50, 74, 0.30);

      --nav-bg: rgba(240, 212, 216, 0.84);
      --nav-border: rgba(62, 30, 35, 0.08);

      --hero-blob: radial-gradient(60% 60% at 30% 40%, rgba(168,50,74,0.13) 0%, rgba(168,50,74,0) 60%),
                   radial-gradient(50% 60% at 80% 30%, rgba(217,122,133,0.20) 0%, rgba(217,122,133,0) 60%);
    }

    
    html[data-theme="dark"][data-mode="nsfw"] {
      --pink: #1f1216;          
      --pink-soft: #2d1a1f;     
      --pink-deep: #3a232a;
      --cream: #261519;

      --charcoal: #f5d8dc;      
      --charcoal-soft: #ecc8cc;
      --ink: #ffffff;
      --gray: #b8959c;
      --gray-light: #6b4d54;

      --surface: #2a181d;

      --purple: #e87490;        
      --purple-soft: #f09cad;
      --purple-tint: #3a1f25;

      --gold: #f0a08c;          
      --gold-deep: #d97a6a;
      --gold-tint: #3a2218;
      --status-ych-dot: #84b2ff;
      --status-ych-bg: rgba(132, 178, 255, 0.18);
      --status-ych-color: #e7f0ff;
      --status-ych-border: rgba(132, 178, 255, 0.22);
      --status-closed-dot: #ff6f88;
      --status-closed-bg: rgba(255, 111, 136, 0.18);
      --status-closed-color: #ffd6de;
      --status-closed-border: rgba(255, 111, 136, 0.22);

      --shadow-sm: 0 1px 2px rgba(0,0,0,0.45), 0 2px 6px rgba(232,116,144,0.10);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.50), 0 8px 24px rgba(232,116,144,0.14);
      --shadow-lg: 0 12px 32px rgba(0,0,0,0.55), 0 24px 60px rgba(232,116,144,0.18);
      --shadow-glow-gold: 0 0 0 1px rgba(240, 160, 140, 0.4), 0 8px 24px rgba(240, 160, 140, 0.32);
      --shadow-glow-purple: 0 0 0 1px rgba(232, 116, 144, 0.45), 0 8px 28px rgba(232, 116, 144, 0.34);

      --nav-bg: rgba(31, 18, 22, 0.82);
      --nav-border: rgba(245, 216, 220, 0.10);

      --hero-blob: radial-gradient(60% 60% at 30% 40%, rgba(232,116,144,0.16) 0%, rgba(232,116,144,0) 60%),
                   radial-gradient(50% 60% at 80% 30%, rgba(240,160,140,0.18) 0%, rgba(240,160,140,0) 60%);
    }

    html { transition: background-color var(--d-3) var(--ease-out); }
    body { transition: background-color var(--d-3) var(--ease-out), color var(--d-3) var(--ease-out); }
    
    section { transition: background-color var(--d-3) var(--ease-out); }

    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.55;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    button { font: inherit; cursor: pointer; }

    
    .reveal {
      opacity: 0;
      transform: translateY(14px);
      transition: opacity var(--d-4) var(--ease-out), transform var(--d-4) var(--ease-out);
      transition-delay: var(--reveal-delay, 0ms);
    }
    .reveal.in {
      opacity: 1;
      transform: translateY(0);
    }
    @media (prefers-reduced-motion: reduce) {
      .reveal { opacity: 1; transform: none; transition: none; }
      *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    }

    
    ::selection { background: var(--purple); color: #fff; }

    
    .container {
      width: min(var(--maxw), calc(100% - var(--s-6)));
      margin-inline: auto;
    }

    
    @keyframes sparkle-drift {
      0%   { transform: translate(0, 0) scale(0.6); opacity: 0; }
      20%  { opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translate(var(--dx, 18px), var(--dy, -22px)) scale(1); opacity: 0; }
    }
    @keyframes shimmer-sweep {
      0%   { transform: translateX(-120%) skewX(-18deg); }
      100% { transform: translateX(220%)  skewX(-18deg); }
    }
    @keyframes wobble {
      0%, 100% { transform: rotate(-1.5deg); }
      50%      { transform: rotate(1.5deg); }
    }
    @keyframes float-y {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }
    @keyframes pill-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(143, 163, 92, 0.4); }
      50%      { box-shadow: 0 0 0 6px rgba(143, 163, 92, 0); }
    }
    
    @keyframes nsfw-pulse {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    @keyframes nsfw-ripple {
      0%   { transform: scale(0.65); opacity: 0.55; }
      100% { transform: scale(2.4);  opacity: 0; }
    }
    .nav-nsfw-toggle.is-pulsing { animation: nsfw-pulse 600ms var(--ease-squish); }
    .nsfw-ripple {
      position: absolute;
      inset: -2px;
      border-radius: var(--r-pill);
      background: radial-gradient(closest-side, var(--purple) 0%, transparent 65%);
      pointer-events: none;
      animation: nsfw-ripple 700ms var(--ease-out) forwards;
      z-index: 0;
    }
  </style>

  
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
