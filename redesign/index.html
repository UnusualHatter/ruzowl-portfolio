<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RuzOwl — Commissions & Portfolio</title>
  <link rel="icon" type="image/png" href="assets/ruz.png" />

  <!-- Fonts: Fraunces (display, soft serif) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─────────────────────────────────────────────────────────────
       DESIGN TOKENS — RuzOwl
       Palette roles (per brand spec):
         --pink         #eedddf  surface-1 (page bg)
         --pink-soft    #fceff0  surface-0 (cards / lift)
         --charcoal     #3e3f41  ink — primary text + high-contrast surfaces
         --purple       #8f2ba3  accent — selection, highlights, signature CTA edges
         --gold         #f0bf59  accent — premium price emphasis, shimmer, badges
         --gray         #7a7a7a  ink-muted — secondary text, captions
       Tints derived from these only.
       ───────────────────────────────────────────────────────────── */
    :root {
      --pink: #eedddf;
      --pink-soft: #fceff0;
      --pink-deep: #e3c9cc;
      --cream: #f7eeea;
      --charcoal: #3e3f41;
      --charcoal-soft: #4a4b4d;
      --ink: #2a2b2d;
      --gray: #7a7a7a;
      --gray-light: #a8a6a4;
      --purple: #8f2ba3;
      --purple-soft: #b96bc8;
      --purple-tint: #f0e2f3;
      --gold: #f0bf59;
      --gold-deep: #d4a23d;
      --gold-tint: #faecc9;

      --bg: var(--pink);
      --surface: #ffffff;
      --surface-warm: var(--pink-soft);
      --text: var(--charcoal);
      --text-muted: var(--gray);

      /* Spacing scale — 4 / 8 / 12 / 16 / 24 / 32 / 48 / 64 / 96 */
      --s-1: 4px;
      --s-2: 8px;
      --s-3: 12px;
      --s-4: 16px;
      --s-5: 24px;
      --s-6: 32px;
      --s-7: 48px;
      --s-8: 64px;
      --s-9: 96px;
      --s-10: 128px;

      /* Radii */
      --r-sm: 8px;
      --r-md: 14px;
      --r-lg: 22px;
      --r-xl: 32px;
      --r-pill: 999px;

      /* Shadows — soft, consistent, pink-tinted */
      --shadow-sm: 0 1px 2px rgba(62, 63, 65, 0.06), 0 2px 6px rgba(143, 43, 163, 0.04);
      --shadow-md: 0 4px 12px rgba(62, 63, 65, 0.06), 0 8px 24px rgba(143, 43, 163, 0.06);
      --shadow-lg: 0 12px 32px rgba(62, 63, 65, 0.08), 0 24px 60px rgba(143, 43, 163, 0.08);
      --shadow-glow-gold: 0 0 0 1px rgba(240, 191, 89, 0.4), 0 8px 24px rgba(240, 191, 89, 0.25);
      --shadow-glow-purple: 0 0 0 1px rgba(143, 43, 163, 0.3), 0 8px 24px rgba(143, 43, 163, 0.2);

      /* Type */
      --font-display: "Fraunces", "Iowan Old Style", Georgia, serif;
      --font-body: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

      /* Motion */
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-squish: cubic-bezier(0.34, 1.56, 0.64, 1);
      --d-1: 120ms;
      --d-2: 220ms;
      --d-3: 380ms;
      --d-4: 600ms;

      /* Layout */
      --maxw: 1120px;

      /* Nav backdrop — translucent so backdrop-filter blur reads */
      --nav-bg: rgba(238, 221, 223, 0.82);
      --nav-border: rgba(62, 63, 65, 0.06);
    }

    /* Dark mode — re-roles the palette: charcoal becomes the surface, pink becomes the muted ink, purple/gold stay as accents but glow against the dark ground */
    html[data-theme="dark"] {
      --pink: #1a1418;          /* page bg — deep aubergine-charcoal */
      --pink-soft: #251c22;     /* lifted card */
      --pink-deep: #322630;     /* deeper card */
      --cream: #1f1820;         /* alt section bg */
      --charcoal: #f4e7e9;      /* ink — was dark, now light */
      --charcoal-soft: #e8d8db;
      --ink: #ffffff;
      --gray: #a89ba1;
      --gray-light: #6b5e64;
      --purple: #c768d6;        /* lifted purple — pops against dark */
      --purple-soft: #d68fe1;
      --purple-tint: #2e1d33;
      --gold: #f5cd72;
      --gold-deep: #e9b346;
      --gold-tint: #3a2c10;

      --bg: var(--pink);
      --surface: #2a2026;
      --surface-warm: var(--pink-soft);
      --text: var(--charcoal);
      --text-muted: var(--gray);

      --shadow-sm: 0 1px 2px rgba(0,0,0,0.4), 0 2px 6px rgba(199,104,214,0.08);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.45), 0 8px 24px rgba(199,104,214,0.1);
      --shadow-lg: 0 12px 32px rgba(0,0,0,0.5), 0 24px 60px rgba(199,104,214,0.14);
      --shadow-glow-gold: 0 0 0 1px rgba(245, 205, 114, 0.4), 0 8px 24px rgba(245, 205, 114, 0.3);
      --shadow-glow-purple: 0 0 0 1px rgba(199, 104, 214, 0.4), 0 8px 28px rgba(199, 104, 214, 0.3);

      --nav-bg: rgba(26, 20, 24, 0.78);
      --nav-border: rgba(244, 231, 233, 0.08);
    }

    /* NSFW Mode Feedback — subtle shift in accent colors for feedback */
    html[data-mode="nsfw"] {
      --purple: #c026d3; /* more vibrant magenta */
      --purple-soft: #e879f9;
      --gold: #f472b6;   /* shifts towards pink/rose */
      --gold-deep: #db2777;
    }
    html[data-theme="dark"][data-mode="nsfw"] {
      --purple: #e879f9;
      --gold: #fb7185;
    }

    html { transition: background-color var(--d-3) var(--ease-out); }
    body { transition: background-color var(--d-3) var(--ease-out), color var(--d-3) var(--ease-out); }

    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.55;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    button { font: inherit; cursor: pointer; }

    /* Section transitions on entry */
    .reveal {
      opacity: 0;
      transform: translateY(14px);
      transition: opacity var(--d-4) var(--ease-out), transform var(--d-4) var(--ease-out);
      transition-delay: var(--reveal-delay, 0ms);
    }
    .reveal.in {
      opacity: 1;
      transform: translateY(0);
    }
    @media (prefers-reduced-motion: reduce) {
      .reveal { opacity: 1; transform: none; transition: none; }
      *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    }

    /* Selection — purple accent */
    ::selection { background: var(--purple); color: #fff; }

    /* Decorative wrapper helpers used by app.jsx */
    .container {
      width: min(var(--maxw), calc(100% - var(--s-6)));
      margin-inline: auto;
    }

    /* Sparkle keyframes (used around hero avatar) */
    @keyframes sparkle-drift {
      0%   { transform: translate(0, 0) scale(0.6); opacity: 0; }
      20%  { opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translate(var(--dx, 18px), var(--dy, -22px)) scale(1); opacity: 0; }
    }
    @keyframes shimmer-sweep {
      0%   { transform: translateX(-120%) skewX(-18deg); }
      100% { transform: translateX(220%)  skewX(-18deg); }
    }
    @keyframes wobble {
      0%, 100% { transform: rotate(-1.5deg); }
      50%      { transform: rotate(1.5deg); }
    }
    @keyframes float-y {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }
    @keyframes pill-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(143, 163, 92, 0.4); }
      50%      { box-shadow: 0 0 0 6px rgba(143, 163, 92, 0); }
    }
  </style>

  <!-- React + Babel (pinned, with integrity) -->

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

</head>
